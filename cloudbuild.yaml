substitutions:
  _SERVICE_NAME: pika-voice-backend
  _REGION: northamerica-northeast2
  _REPOSITORY: pika
  _IMAGE_NAME: voice-backend
  _ALLOW_UNAUTHENTICATED_FLAG: --allow-unauthenticated

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:${BUILD_ID}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:${BUILD_ID}

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:${BUILD_ID}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --port
      - "8080"
      - --memory
      - 2Gi
      - --cpu
      - "2"
      - --timeout
      - "300"
      - --min-instances
      - "1"
      - --max-instances
      - "1"
      - --update-env-vars
      - AUTH_MOBILE_CALLBACK_SCHEME=pikatakehome,OLLAMA_BASE_URL=https://strugglings-mac-mini.tail4752f5.ts.net,OLLAMA_MODEL=qwen:latest,OLLAMA_KEEP_ALIVE=15m,PREWARM_OLLAMA_ON_STARTUP=1,WHISPER_COMMAND=whisper,WHISPER_MODEL=tiny,WHISPER_LANGUAGE=en,WHISPER_CHUNK_DURATION_SECONDS=15,PREWARM_WHISPER_ON_STARTUP=1,FFMPEG_COMMAND=ffmpeg,VOICE_PROFILE_TRAINING_COMMAND=python /app/scripts/train_voice_profile.py,VOICE_PROFILE_TRAINING_MODE=cosyvoice-reference,VOICE_PROFILE_TRAINING_TIMEOUT_SECONDS=300,TTS_TIMEOUT_SECONDS=180,TTS_PROVIDER=cosyvoice,COSYVOICE_COMMAND=python /app/scripts/run_cosyvoice_http.py,COSYVOICE_HTTP_URL=https://strugglings-mac-mini.tail4752f5.ts.net/cosyvoice,COSYVOICE_HTTP_TIMEOUT_SECONDS=180,COSYVOICE_LANGUAGE=en,VOICE_PROFILE_STORAGE_BUCKET=project-a1d1924c-cca8-4c4c-acf-pika-voice-profiles,VOICE_PROFILE_GCS_PREFIX=voice-profiles,VOICE_PROFILE_FIRESTORE_COLLECTION=voiceProfiles,VOICE_PROFILE_JOBS_FIRESTORE_COLLECTION=voiceProfileJobs
      - ${_ALLOW_UNAUTHENTICATED_FLAG}

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:${BUILD_ID}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:latest
